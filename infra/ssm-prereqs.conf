# SSM parameter prerequisites, validated by scripts/deploy.sh before deploy.
# Format (pipe-delimited, per cz-standards infra-ssm-parameters):
#   key|type|required|default|description
# Paths resolve to /cz/<feature>/<namespace>/<key>. Keys map to Settings fields
# by replacing '-' with '_' (see backend/config.py SsmParameterSource) — no
# separate mapping to keep in sync. No database-url here: the app composes it
# from the CloudFormation-provided DB_HOST plus db-master-password, so it never
# goes stale when RDS endpoints change.
db-master-password|SecureString|true||RDS master password (app composes DATABASE_URL from this + DB_HOST)
github-app-id|String|true||GitHub App id
github-app-private-key|SecureString|true||GitHub App PEM private key
github-webhook-secret|SecureString|true||Webhook HMAC secret
secret-key|SecureString|true||JWT signing secret
anthropic-api-key|SecureString|false||Anthropic API key (M1+; scanning-only deploys run without it)
